pre-commit:
  parallel: true
  commands:
    biome-format:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: npx biome format --write {staged_files}
      stage_fixed: true
    biome-lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npx biome lint {staged_files}
    typecheck-web:
      glob: "src/apps/web/**/*.{ts,tsx}"
      run: npm run typecheck --workspace=src/apps/web

commit-msg:
  commands:
    conventional-commit:
      run: node scripts/validate-commit-msg.js "{1}"
