name: Deploy Postprocess

on:
  workflow_dispatch:

concurrency:
  group: deploy-postprocess
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy postprocess service
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        working-directory: src/services/postprocess
        run: railway up --service qvora-postprocess --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
