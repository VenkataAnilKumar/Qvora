name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TypeScript / Next.js ────────────────────────────────────────────────
  web:
    name: Web (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace=src/apps/web

      - name: Lint
        run: npm run lint --workspace=src/apps/web

  # ─── Go API ──────────────────────────────────────────────────────────────
  api:
    name: API (build + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: src/services/api/go.sum

      - name: Build
        working-directory: src/services/api
        run: go build ./...

      - name: Vet
        working-directory: src/services/api
        run: go vet ./...

  # ─── Go Worker ───────────────────────────────────────────────────────────
  worker:
    name: Worker (build + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: src/services/worker/go.sum

      - name: Build
        working-directory: src/services/worker
        run: go build ./...

      - name: Vet
        working-directory: src/services/worker
        run: go vet ./...

  # ─── Rust Postprocessor ──────────────────────────────────────────────────
  postprocess:
    name: Postprocess (check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavfilter-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavdevice-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/services/postprocess

      - name: Check
        working-directory: src/services/postprocess
        run: cargo check --features ffmpeg

      - name: Clippy
        working-directory: src/services/postprocess
        run: cargo clippy --features ffmpeg -- -D warnings
